<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Prashant Subedi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 560px; margin: 0 auto; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #818cf8;
      font-size: 0.9rem;
      text-decoration: none;
      margin-bottom: 2.5rem;
    }
    .back:hover { color: #a5b4fc; }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .subtitle { color: #64748b; margin-bottom: 2.5rem; }
    .contact-list { display: flex; flex-direction: column; gap: 1rem; }
    .contact-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .contact-item:hover { transform: translateY(-2px); }
    .contact-item.email:hover  { border-color: #6366f1; }
    .contact-item.phone:hover  { border-color: #22c55e; }
    .contact-item.fb:hover     { border-color: #3b82f6; }
    .contact-item.insta:hover  { border-color: #ec4899; }
    .icon { font-size: 1.5rem; }
    .info .label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .info .value { font-size: 0.95rem; color: #e2e8f0; font-weight: 500; }
    .contact-item.email:hover  .value { color: #a5b4fc; }
    .contact-item.phone:hover  .value { color: #86efac; }
    .contact-item.fb:hover     .value { color: #93c5fd; }
    .contact-item.insta:hover  .value { color: #f9a8d4; }
  </style>
</head>
<body>
  <div class="container">
    <a href="../app.html" class="back">← Back to Portfolio</a>
    <h1>Contact Me</h1>
    <p class="subtitle">Feel free to reach out through any of the channels below.</p>

    <div class="contact-list">
      <a href="mailto:prashantsubedi718@gmail.com" class="contact-item email">
        <div class="icon">📧</div>
        <div class="info">
          <div class="label">Email</div>
          <div class="value">prashantsubedi718@gmail.com</div>
        </div>
      </a>

      <a href="tel:07090156326" class="contact-item phone">
        <div class="icon">📞</div>
        <div class="info">
          <div class="label">Phone</div>
          <div class="value">07090156326</div>
        </div>
      </a>

      <a href="https://www.facebook.com/kshitij.subedi.12" target="_blank" rel="noopener" class="contact-item fb">
        <div class="icon">💬</div>
        <div class="info">
          <div class="label">Facebook</div>
          <div class="value">Prashant Subedi</div>
        </div>
      </a>

      <a href="https://www.instagram.com/prashantsub12/" target="_blank" rel="noopener" class="contact-item insta">
        <div class="icon">📸</div>
        <div class="info">
          <div class="label">Instagram</div>
          <div class="value">@prashantsub12</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
